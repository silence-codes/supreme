---
services:
  # Main supreme2l service - scan local project
  supreme2l:
    build:
      context: .
      dockerfile: Dockerfile
    image: supreme2l-security:0.7.0.0
    container_name: supreme2l-scanner
    restart: unless-stopped
    volumes:
      - .:/workspace:ro  # Mount current directory as read-only
    command: scan /workspace

  # Development service - interactive shell
  supreme2l-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: supreme2l-security:0.7.0.0
    container_name: supreme2l-dev
    restart: "no"
    volumes:
      - .:/workspace
    entrypoint: /bin/bash
    stdin_open: true
    tty: true

  # Test service - runs tests in container
  supreme2l-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    image: supreme2l-test:0.7.0.0
    container_name: supreme2l-test
    restart: unless-stopped
    volumes:
      - .:/workspace
    command: pytest tests/ -v
