<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #9b59b6;
            --bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: var(--vscode-font-family);
            padding: 20px;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
        }

        /* Status Card */
        .status-card {
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .chart-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        .content-layer {
            position: relative;
            z-index: 1;
        }

        .stat-big {
            font-size: 2.5em;
            font-weight: 200;
            color: #fff;
            margin: 10px 0;
        }

        .stat-label {
            text-transform: uppercase;
            font-size: 0.7em;
            letter-spacing: 2px;
            color: #888;
        }

        .mini-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }

        .mini-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ms-val {
            font-weight: bold;
        }

        .ms-label {
            font-size: 0.6em;
            color: #aaa;
        }

        .crit {
            color: #e74c3c;
        }

        .high {
            color: #e67e22;
        }

        /* Scan Button */
        .scan-btn-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .scan-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8e44ad, #9b59b6);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 0 20px rgba(155, 89, 182, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-btn img {
            width: 32px;
            height: 32px;
        }

        .scan-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(155, 89, 182, 0.6);
        }

        .scan-btn:active {
            transform: scale(0.95);
        }

        /* Pulse Animation */
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--primary);
            opacity: 0;
            animation: none;
        }

        .scanning .pulse-ring {
            animation: pulse 2s infinite;
        }

        .scanning .pulse-ring:nth-child(2) {
            animation-delay: 0.5s;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        /* Stop Button */
        .stop-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .stop-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .stop-btn:active {
            transform: scale(0.95);
        }

        .scanning .stop-btn {
            display: flex;
        }

        .scanning .scan-btn {
            display: none;
        }

        /* Scanning Text */
        .status-text {
            font-size: 0.9em;
            color: #ccc;
            height: 20px;
            letter-spacing: 1px;
        }

        .action-link {
            margin-top: 20px;
            font-size: 0.8em;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
        }

        .action-link:hover {
            color: #fff;
        }

        /* Update Database Button */
        .update-db-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #aaa;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75em;
            margin-top: 10px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            letter-spacing: 0.5px;
        }

        .update-db-btn:hover {
            border-color: var(--primary);
            color: #fff;
            background: rgba(155, 89, 182, 0.1);
        }

        .update-db-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .update-db-btn .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Activate Button */
        .activate-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ccc;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .activate-btn:hover {
            border-color: var(--primary);
            color: #fff;
        }

        /* Activation Form */
        .activation-area {
            width: 100%;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .license-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px;
            color: #fff;
            border-radius: 4px;
            outline: none;
            font-family: monospace;
        }

        .license-input:focus {
            border-color: var(--primary);
        }

        .activate-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ccc;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s;
        }

        .activate-btn.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .activate-btn:hover {
            border-color: var(--primary);
            color: #fff;
        }

        /* Buy License Button */
        .buy-license-btn {
            width: 100%;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border: none;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.3);
            letter-spacing: 1px;
        }

        .buy-license-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(155, 89, 182, 0.5);
        }
    </style>
</head>

<body>
    <div class="status-card">
        <div class="chart-container" id="chart-bg"></div>
        <div class="content-layer">
            <div class="stat-label">SECURITY SCORE</div>
            <div class="stat-big" id="score">--</div>
            <div class="mini-stats">
                <div class="mini-stat">
                    <span class="ms-val crit" id="crit-val">0</span>
                    <span class="ms-label">CRIT</span>
                </div>
                <div class="mini-stat">
                    <span class="ms-val high" id="high-val">0</span>
                    <span class="ms-label">HIGH</span>
                </div>
                <div class="mini-stat">
                    <span class="ms-val" id="total-val">0</span>
                    <span class="ms-label">TOTAL</span>
                </div>
            </div>
        </div>
    </div>

    <div class="scan-btn-container" id="btn-container">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <button class="scan-btn" id="scan-btn">
            START
        </button>
        <button class="stop-btn" id="stop-btn">
            STOP
        </button>
    </div>

    <div class="status-text" id="status-text">READY TO SCAN</div>

    <button class="update-db-btn" id="update-db-btn">
        <span id="update-db-text">🔄 Update Database</span>
    </button>
    <div id="db-last-update" style="font-size: 0.7em; color: #888; text-align: center; margin-top: 5px;"></div>

    <div class="activation-area" id="activation-area">
        <input type="text" class="license-input" id="license-input" placeholder="Enter License Key...">
        <button class="activate-btn" id="activate-btn">Activate License</button>
        <button class="buy-license-btn" id="buy-license-btn">🛒 Buy License</button>
    </div>

    <div id="license-info"
        style="display: none; margin-top: 15px; text-align: center; background: rgba(46, 204, 113, 0.1); padding: 10px; border-radius: 4px; border: 1px solid rgba(46, 204, 113, 0.3);">
        <div style="font-size: 0.7em; color: #2ecc71; letter-spacing: 1px; margin-bottom: 5px;">LICENSE ACTIVE</div>
        <div id="license-key-display" style="font-family: monospace; color: #fff; letter-spacing: 2px;"></div>
    </div>
    <div class="action-link" id="export-btn">Export Report (JSON)</div>

    <script>
        const vscode = acquireVsCodeApi();
        const btn = document.getElementById('scan-btn');
        const stopBtn = document.getElementById('stop-btn');
        const exportBtn = document.getElementById('export-btn');
        const activateBtn = document.getElementById('activate-btn');
        const buyLicenseBtn = document.getElementById('buy-license-btn');
        const updateDbBtn = document.getElementById('update-db-btn');
        const updateDbText = document.getElementById('update-db-text');
        const container = document.getElementById('btn-container');
        const statusText = document.getElementById('status-text');
        const chartBg = document.getElementById('chart-bg');

        // Stats
        const scoreEl = document.getElementById('score');
        const critEl = document.getElementById('crit-val');
        const highEl = document.getElementById('high-val');
        const totalEl = document.getElementById('total-val');

        btn.addEventListener('click', () => {
            vscode.postMessage({ type: 'startScan' });
        });

        stopBtn.addEventListener('click', () => {
            vscode.postMessage({ type: 'stopScan' });
        });

        exportBtn.addEventListener('click', () => {
            vscode.postMessage({ type: 'export' });
        });

        activateBtn.addEventListener('click', () => {
            const key = document.getElementById('license-input').value;
            if (key) {
                vscode.postMessage({ type: 'activate', key: key });
                statusText.innerText = "ACTIVATING...";
            }
        });

        buyLicenseBtn.addEventListener('click', () => {
            vscode.postMessage({ type: 'buyLicense' });
        });

        updateDbBtn.addEventListener('click', () => {
            updateDbBtn.disabled = true;
            updateDbText.innerHTML = '<span class="spinner"></span> Updating...';
            vscode.postMessage({ type: 'updateDatabase' });
        });

        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.type) {
                case 'state':
                    if (message.isScanning) {
                        container.classList.add('scanning');
                        statusText.innerText = "SCANNING...";
                        btn.style.background = "#555";
                        btn.disabled = true;
                    } else {
                        container.classList.remove('scanning');
                        statusText.innerText = "READY TO SCAN";
                        btn.style.background = "linear-gradient(135deg, #8e44ad, #9b59b6)";
                        btn.disabled = false;
                    }
                    if (message.isLicensed) {
                        document.getElementById('activation-area').style.display = 'none';
                        document.getElementById('license-info').style.display = 'block';
                    }
                    break;
                case 'license':
                    if (message.key) {
                        const masked = message.key.substring(0, 5) + "****************";
                        document.getElementById('license-key-display').innerText = masked;
                        document.getElementById('activation-area').style.display = 'none';
                        document.getElementById('license-info').style.display = 'block';
                    }
                    break;
                case 'dbUpdateResult':
                    updateDbBtn.disabled = false;
                    if (message.success) {
                        updateDbText.innerHTML = '✅ ' + message.message;
                    } else {
                        updateDbText.innerHTML = '❌ ' + message.message;
                    }
                    if (message.lastUpdate) {
                        const d = new Date(message.lastUpdate);
                        document.getElementById('db-last-update').innerText = 'Last update: ' + d.toLocaleString();
                    }
                    setTimeout(() => {
                        updateDbText.innerHTML = '🔄 Update Database';
                    }, 3000);
                    break;
                case 'dbLastUpdate':
                    if (message.lastUpdate) {
                        const d = new Date(message.lastUpdate);
                        document.getElementById('db-last-update').innerText = 'Last update: ' + d.toLocaleString();
                    }
                    break;
                case 'chart':
                    chartBg.innerHTML = message.svg;
                    break;
                case 'stats':
                    totalEl.innerText = message.total;
                    critEl.innerText = message.critical;
                    highEl.innerText = message.high;

                    if (message.score) {
                        scoreEl.innerText = message.score;
                        // Color coding based on score (0-100)
                        let scoreVal = parseFloat(message.score);
                        if (scoreVal >= 90) scoreEl.style.color = "#2ecc71";
                        else if (scoreVal >= 70) scoreEl.style.color = "#f1c40f";
                        else if (scoreVal >= 50) scoreEl.style.color = "#e67e22";
                        else scoreEl.style.color = "#e74c3c";
                    } else {
                        // Fallback logic
                        if (message.total === 0) {
                            scoreEl.innerText = "A+";
                            scoreEl.style.color = "#2ecc71";
                        } else {
                            if (message.critical > 0) {
                                scoreEl.innerText = "F";
                                scoreEl.style.color = "#e74c3c";
                            } else {
                                scoreEl.innerText = "C";
                                scoreEl.style.color = "#e67e22";
                            }
                        }
                    }
                    break;
            }
        });

        // Notify extension that webview is ready to receive state
        vscode.postMessage({ type: 'ready' });
    </script>
</body>

</html>
